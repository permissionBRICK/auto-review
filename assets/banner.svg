<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#0f1522"/>
      <stop offset="100%" stop-color="#131a2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <marker id="headBlue" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="4.2" markerHeight="4.2" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="headGreen" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="4.2" markerHeight="4.2" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- card background -->
  <rect x="1" y="1" width="958" height="258" rx="18" fill="url(#bg)" stroke="#21262d" stroke-width="2"/>

  <!-- faint diff decoration, top right -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">
    <text x="700" y="52" fill="#3fb950" opacity="0.35">+ approved</text>
    <text x="700" y="78" fill="#f85149" opacity="0.28">- changes_requested</text>
    <text x="700" y="104" fill="#3fb950" opacity="0.22">+ git commit ✓</text>
  </g>

  <!-- loop mark -->
  <g fill="none" stroke-linecap="round">
    <path d="M 81.1 107.2 A 54 54 0 0 1 178.9 107.2" stroke="#58a6ff" stroke-width="10" marker-end="url(#headBlue)"/>
    <path d="M 178.9 152.8 A 54 54 0 0 1 81.1 152.8" stroke="#3fb950" stroke-width="10" marker-end="url(#headGreen)"/>
    <path d="M 106 130 l 16 16 l 34 -36" stroke="#e6edf3" stroke-width="9"/>
  </g>

  <!-- wordmark -->
  <text x="240" y="118" font-size="62" font-weight="700" letter-spacing="-1">
    <tspan fill="#e6edf3">auto</tspan><tspan fill="url(#accent)">-review</tspan>
  </text>
  <text x="242" y="160" font-size="21" fill="#8b949e">An autonomous code-review loop between two AI coding agents.</text>

  <!-- role chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
    <rect x="242" y="188" width="152" height="34" rx="17" fill="#58a6ff" fill-opacity="0.10" stroke="#58a6ff" stroke-opacity="0.45"/>
    <text x="318" y="210" fill="#79c0ff" text-anchor="middle">developer agent</text>
    <text x="412" y="211" fill="#8b949e" font-size="17" text-anchor="middle">⇄</text>
    <rect x="430" y="188" width="130" height="34" rx="17" fill="#bc8cff" fill-opacity="0.10" stroke="#bc8cff" stroke-opacity="0.45"/>
    <text x="495" y="210" fill="#d2a8ff" text-anchor="middle">coordinator</text>
    <text x="578" y="211" fill="#8b949e" font-size="17" text-anchor="middle">⇄</text>
    <rect x="596" y="188" width="146" height="34" rx="17" fill="#3fb950" fill-opacity="0.10" stroke="#3fb950" stroke-opacity="0.45"/>
    <text x="669" y="210" fill="#56d364" text-anchor="middle">reviewer agent</text>
  </g>
</svg>
